<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:url("bg.gif") no-repeat center center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* Navigation */

header{
width:100%;
background:rgba(255,255,255,0.9);
padding:15px 0;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

nav{
width:80%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

nav ul{
list-style:none;
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:#333;
font-weight:bold;
}

nav a:hover{
color:#764ba2;
}

/* Card */

.card{
margin-top:60px;
background:rgba(255,255,255,0.95);
width:90%;
max-width:650px;
padding:40px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
display:flex;
gap:30px;
align-items:center;
}

@media (max-width:700px){

.card{
flex-direction:column;
text-align:center;
}

.profile img{
width:180px;
height:180px;
}

}






.profile img{
width:100%;
height:auto;
border-radius:10px;
object-fit:cover;
}

.info h2{
color:#764ba2;
margin-bottom:10px;
}

.info h3{
margin-bottom:10px;
}

.info p{
margin-bottom:8px;
}

/* About section */

/* About section */

.about-section{
margin-top:30px;
background:rgba(255,255,255,0.95);
width:90%;
max-width:650px;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

.about-section h4{
color:#764ba2;
margin-bottom:10px;
}

.about-section p{
line-height:1.6;
}


/*try lang*/
.card,
.about-section{
width:90%;
max-width:650px;
}

/* Footer */

footer{
margin-top:auto;
width:100%;
text-align:center;
padding:20px;
background:rgba(255,255,255,0.9);
box-shadow:0 -3px 8px rgba(0,0,0,0.1);
}

footer h3{
font-size:16px;
margin-bottom:8px;
}

footer p{
font-size:14px;
}
</style>

</head>



<body>

<header>
<nav>
<h2 class="logo">Portfolio</h2>

<ul>

</nav>

    <div  class="profile" >
        <img src="Quiz_1.jpg" alt="Quiz 1">
        <p>Quiz 1</p>
    </div>

 <div  class="profile" >
